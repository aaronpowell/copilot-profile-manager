name: Pull Request

on:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore .\CopilotProfileManager.slnx

      - name: Build
        run: dotnet build .\CopilotProfileManager.slnx --configuration Release --no-restore
