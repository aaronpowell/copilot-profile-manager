name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore
        run: dotnet restore .\CopilotProfileManager.slnx

      - name: Publish app
        run: >
          dotnet publish .\src\CopilotProfileManager.WinUI\CopilotProfileManager.WinUI.csproj
          --configuration Release
          --runtime win-x64
          --self-contained false
          -p:WindowsPackageType=None
          -p:PublishSingleFile=false
          -o .\artifacts\publish\win-x64

      - name: Create archive
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $archive = "CopilotProfileManager-$tag-win-x64.zip"
          Compress-Archive -Path .\artifacts\publish\win-x64\* -DestinationPath ".\artifacts\$archive"
          "ARCHIVE_NAME=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: .\artifacts\${{ env.ARCHIVE_NAME }}
          generate_release_notes: true
